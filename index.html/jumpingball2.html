<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jumping ball</title>
</head>
<style>
    .box {

        height: 40vh;
        width: 20vw;
        border: 2px solid black;
        background-color: lightblue;
        position: relative;
        
    }

    @keyframes ashishx {
          /* Start on the left */
    0%   { transform: translate(0, 0); }

    /* Step jump 1 (jump → land) */
    10%  { transform: translate(40px, -80px); }
    20%  { transform: translate(80px, 0); }

    /* Step jump 2 */
    30%  { transform: translate(120px, -80px); }
    40%  { transform: translate(160px, 0); }

    /* Step jump 3 */
    50%  { transform: translate(200px, -80px); }
    60%  { transform: translate(240px, 0); }

    /* Coming back step-by-step */

    /* Step jump left 1 */
    70%  { transform: translate(200px, -80px); }
    80%  { transform: translate(160px, 0); }

    /* Step jump left 2 */
    85%  { transform: translate(120px, -80px); }
    90%  { transform: translate(80px, 0); }

    /* Step jump left 3 */
    95%  { transform: translate(40px, -80px); }
    100% { transform: translate(0, 0); }
  }

    .ball {

        height: 40px;
        width: 40px;
        background-color: orange;
        border-radius: 70%;
        position: absolute;
        left: 0;
        bottom: 0;
        animation: ashishx 3s ease-in infinite;
        


    }
</style>


<body>
    <div class="box">
        <div class="ball"></div>
    </div>
</body>

</html>
