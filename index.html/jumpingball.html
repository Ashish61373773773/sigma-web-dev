<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Step by Step Jump</title>

<style>
  .box {
    width: 350px;
    height: 200px;
    border: 3px solid #000;
    margin: 50px auto;
    position: relative;
    overflow: hidden;
  }

  .ball {
    width: 40px;
    height: 40px;
    background: red;
    border-radius: 50%;
    position: absolute;
    bottom: 0;

    animation: stepJump 6s ease-in infinite;
  }

  @keyframes stepJump {
    /* Start on the left */
    0%   { transform: translate(0, 0); }

    /* Step jump 1 (jump → land) */
    10%  { transform: translate(40px, -80px); }
    20%  { transform: translate(80px, 0); }

    /* Step jump 2 */
    30%  { transform: translate(120px, -80px); }
    40%  { transform: translate(160px, 0); }

    /* Step jump 3 */
    50%  { transform: translate(200px, -80px); }
    60%  { transform: translate(240px, 0); }

    /* Coming back step-by-step */

    /* Step jump left 1 */
    70%  { transform: translate(200px, -80px); }
    80%  { transform: translate(160px, 0); }

    /* Step jump left 2 */
    85%  { transform: translate(120px, -80px); }
    90%  { transform: translate(80px, 0); }

    /* Step jump left 3 */
    95%  { transform: translate(40px, -80px); }
    100% { transform: translate(0, 0); }
  }
</style>

</head>
<body>

<div class="box">
  <div class="ball"></div>
</div>

</body>
</html>
