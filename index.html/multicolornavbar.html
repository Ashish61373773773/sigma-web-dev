<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>multi color navbaar</title>

    <style>
        * {
            margin: 0;
            padding: 0;
        }

        /* :root{
            --color:rgb(0, 0, 0);
            --background-color:rgb(139, 235, 160);
            --seccolor:red;
            

        } */
        /* :root{
            --color:rgb(223, 225, 223);
            --background-color:rgb(27, 37, 147);
            --seccolor:rgb(6, 224, 228);

        } */

        :root {
            --color: rgb(221, 221, 221);
            --background-color: rgb(215, 180, 38);
            --seccolor: rgb(150, 6, 228);

        }


        body {
            background-color: var(--seccolor);
        }

        .box {

            height: 5vh;


            margin: auto;
            border: 2px solid black;
            color: var(--color);
            background-color: var(--background-color);


        }

        li {

            list-style: none;
            margin: 10px;
            padding: 10px;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;


        }

        .box ul {
            margin: auto;
            margin-top: -9px;
            display: flex;

        }

        a {
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="box">
        <ul>
            <li><a href="">Home</a></li>
            <li><a href="">Help</a></li>
            <li><a href="">About</a></li>
            <li><a href="">order</a></li>
            <li><a href="">contact us</a></li>
            <li><a href="">sell</a></li>
            <li><a href="">product</a></li>

        </ul>
    </div>
</body>

</html>
